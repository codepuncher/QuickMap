name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - ".clang-format"
      - ".clang-tidy"
      - "CMakeLists.txt"
      - "cmake/**"
      - "vcpkg.json"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  clang-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: DoozyX/clang-format-lint-action@v0.20
        with:
          source: src
          extensions: cpp,h
          clangFormatVersion: 19

  clang-tidy:
    needs: clang-format
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: ilammy/msvc-dev-cmd@v1

      - uses: KyleMayes/install-llvm-action@v2
        with:
          version: "19"

      - uses: lukka/get-cmake@latest

      - name: Restore vcpkg binary cache
        uses: actions/cache@v5
        with:
          path: C:\vcpkg-cache
          key: vcpkg-${{ hashFiles('vcpkg.json', 'cmake/triplets/**', 'cmake/ports/**') }}
          restore-keys: vcpkg-

      - uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: ${{ github.workspace }}/lib/vcpkg
        env:
          VCPKG_BINARY_SOURCES: "clear;files,C:\\vcpkg-cache,readwrite"

      - name: Configure
        uses: lukka/run-cmake@v10
        with:
          configurePreset: tidy-windows
        env:
          VCPKG_BINARY_SOURCES: "clear;files,C:\\vcpkg-cache,readwrite"

      - name: Run clang-tidy
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path src -Include *.cpp -Recurse |
            Select-Object -ExpandProperty FullName
          clang-tidy.exe -p build/tidy $files

  build:
    needs: clang-format
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install CMake and Ninja
        uses: lukka/get-cmake@latest

      - name: Restore vcpkg binary cache
        uses: actions/cache@v5
        with:
          path: C:\vcpkg-cache
          key: vcpkg-${{ hashFiles('vcpkg.json', 'cmake/triplets/**', 'cmake/ports/**') }}
          restore-keys: vcpkg-

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: ${{ github.workspace }}/lib/vcpkg
        env:
          VCPKG_BINARY_SOURCES: "clear;files,C:\\vcpkg-cache,readwrite"

      - name: Configure and Build
        uses: lukka/run-cmake@v10
        with:
          configurePreset: release-windows
          buildPreset: release-windows
        env:
          VCPKG_BINARY_SOURCES: "clear;files,C:\\vcpkg-cache,readwrite"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ github.event.repository.name }}
          path: |
            build/msvc/Release/*.dll
            build/msvc/Release/*.pdb
