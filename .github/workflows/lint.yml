name: Lint

on:
  pull_request:
    paths:
      - 'scripts/**'

permissions: {}

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Run shellcheck
        uses: azohra/shell-linter@v0.8.0
        with:
          path: "scripts/*.sh"
